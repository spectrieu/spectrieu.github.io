dex &lt; nums-&gt;size);<br>    nums-&gt;arr[index] = num;<br>&#125;<br><br><span class="hljs-comment">/*在尾部添加元素*/</span><br><span class="hljs-type">void</span> <span class="hljs-title function_">add</span><span class="hljs-params">(mylist *nums, <span class="hljs-type">int</span> num)</span><br>&#123;<br>    <span class="hljs-keyword">if</span> (size(nums) == capacity(nums)) <span class="hljs-comment">//利用size函数和capacity函数（的返回值）比较来判断是否需要扩容</span><br>    &#123;<br>        extendcapacity(nums); <span class="hljs-comment">//扩容</span><br>    &#125;<br>    nums-&gt;arr[size(nums)] = num;<br>    nums-&gt;size++; <span class="hljs-comment">//实际包含元素+1</span><br><br>    <span class="hljs-comment">//在尾部添加元素效率较高，算法复杂度为O(1)</span><br>&#125;<br><br><span class="hljs-comment">/*插入元素*/</span><br><span class="hljs-type">void</span> <span class="hljs-title function_">insert</span><span class="hljs-params">(mylist *nums, <span class="hljs-type">int</span> index, <span class="hljs-type">int</span> num)</span><br>&#123;<br>    assert(index &gt;= <span class="hljs-number">0</span> &amp;&amp; index &lt; size(nums));<br>    <span class="hljs-comment">//元素数量超出容量时，触发扩容机制。添加扩容机制，也有效地解决了之前数组插入时，尾部元素丢失的问题</span><br>    <span class="hljs-keyword">if</span> (size(nums) == capacity(nums)) <span class="hljs-comment">//利用size函数和capacity函数（的返回值）比较来判断是否需要扩容</span><br>    &#123;<br>        extendcapacity(nums); <span class="hljs-comment">//扩容</span><br>    &#125;<br>    <span class="hljs-keyword">for</span> (<span class="hljs-type">int</span> i = size(nums); i &gt; index; i--)<br>    &#123;<br>        nums-&gt;arr[i] = nums-&gt;arr[i - <span class="hljs-number">1</span>]; <span class="hljs-comment">//顺带一提，在索引2处插入元素，是在索引1的后面插入，即新元素的下标为2</span><br>    &#125;<br>    nums-&gt;arr[index] = num;<br>    nums-&gt;size++;<br>&#125;<br><br><span class="hljs-comment">/*删除元素*/</span><br><span class="hljs-type">int</span> <span class="hljs-title function_">removeitem</span><span class="hljs-params">(mylist *nums, <span class="hljs-type">int</span> index)</span><br>&#123;<br>    assert(index &gt;= <span class="hljs-number">0</span> &amp;&amp; index &lt; size(nums));<br>    <span class="hljs-type">int</span> num = nums-&gt;arr[index];<br>    <span class="hljs-keyword">for</span> (<span class="hljs-type">int</span> i = index; i &lt; size(nums) - <span class="hljs-number">1</span>; i++)<br>    &#123;<br>        nums-&gt;arr[i] = nums-&gt;arr[i + <span class="hljs-number">1</span>];<br>    &#125;<br>    nums-&gt;size--;<br>    <span class="hljs-keyword">return</span> num; <span class="hljs-comment">//返回删除的元素的值，便于检测</span><br>&#125;<br><br><span class="hljs-comment">/*列表扩容*/</span><br><span class="hljs-type">void</span> <span class="hljs-title function_">extendcapacity</span><span class="hljs-params">(mylist *nums)</span><br>&#123;<br>    <span class="hljs-comment">//一，分配空间</span><br>    <span class="hljs-type">int</span> newcapacity = capacity(nums) * nums-&gt;extendratio;   <span class="hljs-comment">//扩容后的可容纳的元素个数</span><br>    <span class="hljs-type">int</span> *extend = (<span class="hljs-type">int</span> *)<span class="hljs-built_in">malloc</span>(<span class="hljs-keyword">sizeof</span>(<span class="hljs-type">int</span>) * newcapacity); <span class="hljs-comment">//将扩容后的数组内存地址返回</span><br>    <span class="hljs-type">int</span> *temp = nums-&gt;arr;                                  <span class="hljs-comment">//方便后续释放不再需要的旧数组内存。nums-&gt;arr稍后会将扩容后的数组的新地址存放在内，所以需要先释放旧地址内存，避免内存泄漏</span><br><br>    <span class="hljs-comment">//二，拷贝旧数据到新数据</span><br>    <span class="hljs-keyword">for</span> (<span class="hljs-type">int</span> i = <span class="hljs-number">0</span>; i &lt; size(nums); i++)<br>    &#123;<br>        extend[i] = nums-&gt;arr[i];<br>    &#125;<br><br>    <span class="hljs-comment">//三，释放旧数据</span><br>    <span class="hljs-built_in">free</span>(temp);<br><br>    <span class="hljs-comment">//四，更新新数据（落实到列表的要素中，扩展列表才是目的）</span><br>    nums-&gt;arr = extend;<br>    nums-&gt;capacity = newcapacity;<br>&#125;<br><br><span class="hljs-comment">/*将列表转换为数组用于打印*/</span><br><span class="hljs-type">int</span> *<span class="hljs-title function_">toarray</span><span class="hljs-params">(mylist *nums)</span><br>&#123;<br>    <span class="hljs-keyword">return</span> nums-&gt;arr;<br>&#125;<br><br><span class="hljs-comment">/*drivercode*/</span><br><span class="hljs-type">int</span> <span class="hljs-title function_">main</span><span class="hljs-params">()</span><br>&#123;<br>    <span class="hljs-comment">//初始化列表</span><br>    mylist *nums = newlist();<br><br>    <span class="hljs-comment">//在尾部添加元素</span><br>    add(nums, <span class="hljs-number">2</span>);<br>    add(nums, <span class="hljs-number">9</span>);<br>    add(nums, <span class="hljs-number">8</span>);<br>    add(nums, <span class="hljs-number">5</span>);<br>    add(nums, <span class="hljs-number">3</span>);<br><br>    <span class="hljs-comment">//打印列表</span><br>    <span class="hljs-built_in">printf</span>(<span class="hljs-string">&quot;列表nums = &quot;</span>);<br>    printArray(toarray(nums), size(nums)); <span class="hljs-comment">//先把列表转换为数组，然后利用数组打印函数来打印列表</span><br>    <span class="hljs-built_in">printf</span>(<span class="hljs-string">&quot;容量 = %d,实际长度 = %d\n&quot;</span>, capacity(nums), size(nums));<br><br>    <span class="hljs-comment">//在中间插入元素</span><br>    insert(nums, <span class="hljs-number">3</span>, <span class="hljs-number">6</span>);<br>    <span class="hljs-built_in">printf</span>(<span class="hljs-string">&quot;在索引3处插入数字6，得到nums = &quot;</span>);<br>    printArray(toarray(nums), size(nums));<br><br>    <span class="hljs-comment">//删除元素</span><br>    removeitem(nums, <span class="hljs-number">3</span>);<br>    <span class="hljs-built_in">printf</span>(<span class="hljs-string">&quot;删除索引3处的元素，得到nums = &quot;</span>);<br>    printArray(toarray(nums), size(nums));<br><br>    <span class="hljs-comment">//访问元素</span><br>    <span class="hljs-type">int</span> num = get(nums, <span class="hljs-number">2</span>);<br>    <span class="hljs-built_in">printf</span>(<span class="hljs-string">&quot;访问索引2处的元素，得到num = %d\n&quot;</span>, num);<br><br>    <span class="hljs-comment">//更新元素</span><br>    <span class="hljs-built_in">set</span>(nums, <span class="hljs-number">1</span>, <span class="hljs-number">0</span>);<br>    <span class="hljs-built_in">printf</span>(<span class="hljs-string">&quot;将索引1处的元素更新为0，得到nums = &quot;</span>);<br>    printArray(toarray(nums), size(nums));<br><br>    <span class="hljs-comment">//测试扩容机制</span><br>    <span class="hljs-keyword">for</span> (<span class="hljs-type">int</span> i = <span class="hljs-number">0</span>; i &lt; <span class="hljs-number">10</span>; i++)<br>    &#123;<br>        add(nums, i); <span class="hljs-comment">//在列表尾部添加元素i。测试前，列表的长度为5，在i=5时，add函数会判断此时列表的实际大小已经等于列表容量，会触发扩容机制之后再到尾部添加元素5</span><br>    &#125;<br>    <span class="hljs-built_in">printf</span>(<span class="hljs-string">&quot;扩容后的列表 nums = &quot;</span>);<br>    printArray(toarray(nums), size(nums));<br>    <span class="hljs-built_in">printf</span>(<span class="hljs-string">&quot;容量 = %d,实际长度 = %d\n&quot;</span>, capacity(nums), size(nums));<br><br>    <span class="hljs-comment">//释放分配内存</span><br>    dellist(nums);<br><br>    <span class="hljs-keyword">return</span> <span class="hljs-number">0</span>;<br>&#125;<br></code></pre></td></tr></table></figure>
